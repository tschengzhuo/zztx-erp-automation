# Development environment configuration
app:
  name: zztx-erp-automation
  env: dev
  log_level: DEBUG

erp:
  base_url: "https://erp-dev.example.com/api"
  timeout: 30
  retry_times: 3

database:
  host: localhost
  port: 3306
  name: zztx_erp_dev
  user: root
  password: "${DB_PASSWORD}"

sync:
  daily_sync_time: "02:00"
  batch_size: 100

report:
  output_dir: "./output/reports"
  default_format: xlsx
