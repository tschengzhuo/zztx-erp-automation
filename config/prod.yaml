# Production environment configuration
app:
  name: zztx-erp-automation
  env: prod
  log_level: INFO

erp:
  base_url: "https://erp.example.com/api"
  timeout: 60
  retry_times: 5

database:
  host: "${DB_HOST}"
  port: 3306
  name: zztx_erp
  user: "${DB_USER}"
  password: "${DB_PASSWORD}"

sync:
  daily_sync_time: "02:00"
  batch_size: 500

report:
  output_dir: "/data/reports"
  default_format: xlsx
