name: ERP Automation

on:
  schedule:
    # 每天凌晨 2:00 UTC 运行 (北京时间 10:00)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: '要执行的任务'
        required: true
        default: 'daily_sync'
        type: choice
        options:
          - daily_sync
          - report_gen
          - all

jobs:
  daily-sync:
    if: github.event_name == 'schedule' || inputs.task == 'daily_sync' || inputs.task == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily sync
        env:
          APP_ENV: prod
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          ERP_API_KEY: ${{ secrets.ERP_API_KEY }}
        run: python -m src.tasks.daily_sync

  report-generation:
    if: github.event_name == 'schedule' || inputs.task == 'report_gen' || inputs.task == 'all'
    runs-on: ubuntu-latest
    needs: daily-sync
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate reports
        env:
          APP_ENV: prod
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python -m src.tasks.report_gen

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_id }}
          path: |
            /data/reports/
            ./output/reports/
        if: always()
